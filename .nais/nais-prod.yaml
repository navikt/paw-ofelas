apiVersion: nais.io/v1alpha1
kind: Application
metadata:
    name: paw-ofelas
    namespace: paw
    labels:
        team: paw
spec:
    image: {{image}}
    port: 3000
    ingresses:
        - https://www.nav.no/arbeid/veiviser
    replicas:
        min: 2
        max: 4
    resources:
        requests:
            cpu: 50m
            memory: 128Mi
        limits:
            memory: 128Mi
    liveness:
        path: /arbeid/veiviser/api/health
    readiness:
        path: /arbeid/veiviser/api/health
    env:
        - name: DECORATOR_ENV
          value: prod
        - name: FARO_URL
          value: https://telemetry.nav.no/collect
    accessPolicy:
        outbound:
            rules:
                - application: nav-dekoratoren
                  namespace: personbruker
            external:
                - host: telemetry.nav.no
