name: Build and deploy

on:
    push:
        branches:
            - main
            - dev/*

concurrency:
    group: deploy-${{github.ref}}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    test:
        name: Run tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up pnpm
              uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{secrets.READER_TOKEN}}
                  HUSKY: 0

            - name: Test
              run: pnpm test

            - name: Knip
              run: pnpm dlx knip --no-exit-code --reporter=markdown >> "$GITHUB_STEP_SUMMARY"

    build:
        name: Build and Publish Docker image
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: 'read'
            packages: 'write'
            id-token: 'write'
        outputs:
            image: ${{steps.docker-build-push.outputs.image}}
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up pnpm
              uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
                  HUSKY: 0

            - name: Cache Next.js build
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: .next/cache
                  key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx}') }}
                  restore-keys: |
                      nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

            - name: Build
              run: pnpm build
              env:
                  HUSKY: 0

            - name: Push docker image to GAR
              uses: nais/docker-build-push@be85229e81c0293c265c646c084f05317fb6e0d2 # v0
              id: docker-build-push
              with:
                  team: paw
                  identity_provider: ${{secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER}}
                  project_id: ${{vars.NAIS_MANAGEMENT_PROJECT_ID}}

    storybook:
        name: Storybook tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up pnpm
              uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{secrets.READER_TOKEN}}
                  HUSKY: 0

            - name: Cache Playwright browsers
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Build storybook
              run: pnpm build-storybook

            - name: Run storybook tests
              run: pnpm test-storybook

    e2e:
        name: Playwright E2E tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up pnpm
              uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{secrets.READER_TOKEN}}
                  HUSKY: 0

            - name: Cache Playwright browsers
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Run E2E tests
              run: pnpm e2e

            - name: Upload Playwright report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

    deploy-dev:
        name: Deploy to dev
        permissions:
            contents: 'read'
            id-token: 'write'
        needs: [test, build, storybook, e2e]
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev')
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Deploy
              uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 # v2
              env:
                  CLUSTER: dev-gcp
                  RESOURCE: .nais/nais-dev.yaml
                  VAR: image=${{needs.build.outputs.image}}
                  PRINT_PAYLOAD: true

    deploy-prod:
        name: Deploy to prod
        permissions:
            contents: 'read'
            id-token: 'write'
        needs: [build, deploy-dev]
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Deploy
              uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 # v2
              env:
                  CLUSTER: prod-gcp
                  RESOURCE: .nais/nais-prod.yaml
                  VAR: image=${{needs.build.outputs.image}}
