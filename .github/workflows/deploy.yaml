name: Build and deploy

on:
    push:
        branches:
            - main
            - dev/*

concurrency:
    group: deploy-${{github.ref}}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    test:
        name: Run tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Set up pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{secrets.READER_TOKEN}}
                  HUSKY: 0

            - name: Test
              run: pnpm test

            - name: Knip
              run: pnpm dlx knip --no-exit-code --reporter=markdown >> "$GITHUB_STEP_SUMMARY"

    build:
        name: Build and Publish Docker image
        runs-on: ubuntu-latest
        permissions:
            contents: 'read'
            packages: 'write'
            id-token: 'write'
        outputs:
            image: ${{steps.docker-build-push.outputs.image}}
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Set up pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
                  HUSKY: 0

            - name: Cache Next.js build
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: .next/cache
                  key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx}') }}
                  restore-keys: |
                      nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

            - name: Build
              run: pnpm build
              env:
                  HUSKY: 0

            - name: Push docker image to GAR
              uses: nais/docker-build-push@cd5ec5663feb0e05c3fa374d1fb442605b046c6b # v0
              id: docker-build-push
              with:
                  team: paw
                  identity_provider: ${{secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER}}
                  project_id: ${{vars.NAIS_MANAGEMENT_PROJECT_ID}}

    storybook:
        name: Storybook tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Set up pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{secrets.READER_TOKEN}}
                  HUSKY: 0

            - name: Cache Playwright browsers
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Build storybook
              run: pnpm build-storybook

            - name: Run storybook tests
              run: pnpm test-storybook

    e2e:
        name: Playwright E2E tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Set up pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
              with:
                  version: 10

            - name: Set up node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: '24.15.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{secrets.READER_TOKEN}}
                  HUSKY: 0

            - name: Cache Playwright browsers
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Run E2E tests
              run: pnpm e2e

            - name: Upload Playwright report
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

    deploy-dev:
        name: Deploy to dev
        permissions:
            contents: 'read'
            id-token: 'write'
        needs: [test, build, storybook, e2e]
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - name: Deploy
              uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
              env:
                  CLUSTER: dev-gcp
                  RESOURCE: .nais/nais-dev.yaml
                  VAR: image=${{needs.build.outputs.image}}
                  PRINT_PAYLOAD: true

